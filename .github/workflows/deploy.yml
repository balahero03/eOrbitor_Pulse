name: Deploy

# Auto-deploy on every push to main, using the self-hosted runner on the server.
on:
  push:
    branches: [main]
  workflow_dispatch:        # also lets you trigger manually from the Actions tab

jobs:
  deploy:
    runs-on: self-hosted    # runs on the runner installed on the server
    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Sync code into the deployment directory
        # Copy the checked-out code into the live project dir, preserving files
        # that are NOT in git (secrets, the runner itself, build artifacts).
        run: |
          rsync -a --delete \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='actions-runner' \
            --exclude='.git' \
            ./ "$HOME/eOrbitor_pulse/"

      - name: Rebuild and restart containers
        working-directory: /home/administrator/eOrbitor_pulse
        run: |
          docker compose up -d --build
          docker compose ps

      - name: Show recent app logs
        working-directory: /home/administrator/eOrbitor_pulse
        run: docker compose logs --tail=20 app
